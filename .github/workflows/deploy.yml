name: Deploy whatidid Stack to Production (Traefik)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy via Cloudflare Tunnel SSH
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CLOUDFLARE_SSH_HOSTNAME: ${{ secrets.CLOUDFLARE_SSH_HOSTNAME }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh \
                --hostname $CLOUDFLARE_SSH_HOSTNAME \
                --id $CF_ACCESS_CLIENT_ID \
                --secret $CF_ACCESS_CLIENT_SECRET" \
              $PROD_USER@$CLOUDFLARE_SSH_HOSTNAME << 'EOF'

            set -euo pipefail

            echo "🚀 Connected via Cloudflare Tunnel"
            cd ~/Desktop/HTPC

            echo "📥 Pulling latest images..."
            docker compose pull

            echo "🔄 Rebuilding and deploying full stack..."
            docker compose up -d --build --force-recreate --remove-orphans

            echo "🧹 Pruning..."
            docker system prune -f

            echo "✅ Deployment completed at $(date)"
            docker compose ps
            docker logs traefik --tail 30

          EOF