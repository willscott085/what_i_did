name: Deploy whatidid Stack to Production (Traefik)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh

          HOST="${{ secrets.CLOUDFLARE_SSH_HOSTNAME }}"

          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH (Cloudflare Tunnel only)
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.PROD_USER }}@${{ secrets.CLOUDFLARE_SSH_HOSTNAME }} << 'EOF'

            set -euo pipefail

            echo "🚀 Connected via Cloudflare Tunnel"
            cd ~/Desktop/HTPC

            echo "📥 Pulling latest images..."
            docker compose pull

            echo "🔄 Rebuilding and deploying full stack..."
            docker compose up -d --build --force-recreate --remove-orphans

            echo "🧹 Pruning..."
            docker system prune -f

            echo "✅ Deployment completed at $(date)"
            docker compose ps
            docker logs traefik --tail 30

          EOF