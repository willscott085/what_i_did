name: Deploy whatidid Stack to Production (Traefik)

on:
  push:
    branches: [ main ]

# Security: Least privilege
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Force Node.js 24 runtime (eliminates the deprecation warning)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via Cloudflare Tunnel SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOSTNAME }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          timeout: 90s
          command_timeout: 15m
          script: |
            set -euo pipefail

            echo "🚀 Connected via Cloudflare Tunnel"
            cd ~/Desktop/HTPC

            echo "📥 Pulling latest images..."
            docker compose pull

            echo "🔄 Deploying Traefik + services..."
            docker compose up -d --build --force-recreate --remove-orphans

            echo "🧹 Pruning unused resources..."
            docker system prune -f

            echo "✅ Deployment completed at $(date)"
            docker compose ps
            docker logs traefik --tail 30