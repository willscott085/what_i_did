name: Deploy whatidid Stack to Production (Traefik)

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH config for Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh

          cat <<EOF > ~/.ssh/config
          Host prod-mac
            HostName ${{ secrets.CLOUDFLARE_SSH_HOSTNAME }}
            User ${{ secrets.PROD_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Add SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy via SSH over Cloudflare Tunnel
        run: |
          ssh prod-mac << 'EOF'
            set -euo pipefail

            echo "🚀 Connected via Cloudflare Tunnel"
            cd ~/Desktop/HTPC

            echo "📥 Pulling latest images..."
            docker compose pull

            echo "🔄 Rebuilding and deploying full stack..."
            docker compose up -d --build --force-recreate --remove-orphans

            echo "🧹 Pruning..."
            docker system prune -f

            echo "✅ Deployment completed at $(date)"
            docker compose ps
            docker logs traefik --tail 30
          EOF